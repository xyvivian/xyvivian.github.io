bio: >-
  I am a Ph.D. student at Carnegie Mellon University working on outlier
  detection, foundation models, LLM evaluation, and information retrieval.
  I study how to build reliable learning systems and how to evaluate them
  carefully across real-world settings.
bio_extended:
  - >-
    My work focuses on robust outlier detection, foundation models for
    structured data, evaluation of LLM behavior and consistency, and retrieval
    methods that improve information access in long-context and open-domain
    settings.
